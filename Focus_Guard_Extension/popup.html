<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 240px;
      padding: 16px;
      background-color: #0f1115;
      color: #e6e6e6;
      text-align: center;
    }

    h3 {
      margin-bottom: 12px;
      font-size: 16px;
      font-weight: 600;
    }

    #timer {
      font-size: 14px;
      margin: 10px 0;
      padding: 8px;
      border-radius: 8px;
      background-color: #1a1d24;
      font-weight: 500;
    }

    #stats {
      font-size: 12px;
      margin-top: 12px;
      color: #888;
    }

    button {
      margin-top: 12px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <h3>Focus Guard</h3>

  <div id="timer">Locked</div>

  <button id="unlock">Unlock (5 min)</button>

  <div id="stats">
    Today: 0 | Week: 0 | Month: 0
  </div>

  <script src="popup.js"></script>
</body>
</html>
